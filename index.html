<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruta Travels — Coming Soon</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #344E67 0%, #1B2E3F 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 40px 20px;
      text-align: center;
    }
    .logo-container {
      position: relative;
      margin-bottom: 48px;
    }
    .route-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 8px;
    }
    .dot {
      width: 16px;
      height: 16px;
      background: #F2A65A;
      border-radius: 50%;
      position: relative;
      flex-shrink: 0;
    }
    .dot::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 28px;
      border: 1.5px solid rgba(242,166,90,0.3);
      border-radius: 50%;
    }
    .dashes {
      flex: 1;
      max-width: 500px;
      height: 2px;
      background: repeating-linear-gradient(
        to right,
        rgba(242,166,90,0.4) 0px,
        rgba(242,166,90,0.4) 12px,
        transparent 12px,
        transparent 24px
      );
      margin: 0 8px;
    }
    .wordmark {
      position: relative;
    }
    .ruta {
      font-size: clamp(72px, 12vw, 140px);
      font-weight: 600;
      letter-spacing: 0.15em;
      color: #fff;
      line-height: 1;
      background: linear-gradient(180deg, #ffffff 0%, #D0DCE8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .divider {
      width: 60%;
      height: 1px;
      background: rgba(242,166,90,0.5);
      margin: 12px auto;
    }
    .travels {
      font-size: clamp(13px, 2vw, 18px);
      font-weight: 300;
      letter-spacing: 0.5em;
      color: #F2A65A;
      text-transform: uppercase;
    }
    .tagline {
      font-size: clamp(14px, 2vw, 18px);
      font-weight: 300;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.05em;
      margin-top: 48px;
      margin-bottom: 16px;
    }
    .coming-soon {
      font-size: clamp(11px, 1.5vw, 13px);
      font-weight: 400;
      letter-spacing: 0.4em;
      color: rgba(242,166,90,0.7);
      text-transform: uppercase;
      border: 1px solid rgba(242,166,90,0.3);
      padding: 10px 28px;
      border-radius: 2px;
    }
    .footer {
      padding: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.05em;
    }
    .footer a {
      color: rgba(242,166,90,0.5);
      text-decoration: none;
    }
    .footer a:hover { color: #F2A65A; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo-container">
      <div class="route-line">
        <div class="dot"></div>
        <div class="dashes"></div>
        <div class="dot"></div>
      </div>
      <div class="wordmark">
        <div class="ruta">RUTA</div>
        <div class="divider"></div>
        <div class="travels">Travels</div>
      </div>
    </div>
    <p class="tagline">Your all-in-one airport companion</p>
    <div class="coming-soon">Coming Soon to the App Store</div>
  </div>
  <div class="footer">
    &copy; 2026 Ruta Travels Inc. &nbsp;|&nbsp; <a href="/privacy">Privacy Policy</a>
  </div>
</body>
</html>
